name: Auto PR via main

on:
  workflow_dispatch:
  push:
    branches:
      - 'components/**'

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Create PR using GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
          TEST_BRANCH: "main"
          MILESTONE_NAME: "Complete Components"
          REVIEWER_1: "azelynn-aretex"
          REVIEWER_2: "peterpaularetex-creator"
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          PR_LABEL=""
          
          if [[ "$BRANCH_NAME" == components/* ]]; then
            PR_LABEL="components"
          fi
          
          EXISTING_PR=$(gh pr list --repo "aretexit/aretex-ph" --state open --json headRefName,url --jq ".[] | select(.headRefName == \"$BRANCH_NAME\") | .url")
          
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "Verified: PR already exists at $EXISTING_PR"
            exit 0
          fi
          
          gh pr create \
            --repo "aretexit/aretex-ph" \
            --base "$TEST_BRANCH" \
            --head "${{ github.repository_owner }}:$BRANCH_NAME" \
            --title "Automated PR: $BRANCH_NAME" \
            --body "This PR was automatically generated from fork branch $BRANCH_NAME." \
            --label "$PR_LABEL" \
            --milestone "$MILESTONE_NAME" \
            --reviewer "$REVIEWER_1" \
            --reviewer "$REVIEWER_2" \
            --assignee "${{ github.actor }}" \
            --draft